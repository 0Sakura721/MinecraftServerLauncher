name: Build APK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "/usr/local/lib/android/sdk/platform-tools" >> $GITHUB_PATH
          echo "/usr/local/lib/android/sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Download bundled assets (proot + Ubuntu rootfs)
        run: ./gradlew :app:downloadBundledAssets --stacktrace

      - name: Run lint
        run: ./gradlew :app:lint --stacktrace

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Upload Debug APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Build and Upload Release APK (tag only)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > release-keystore.jks
            echo "storeFile=release-keystore.jks" >> local.properties
            echo "storePassword=$KEYSTORE_PASSWORD" >> local.properties
            echo "keyAlias=$KEY_ALIAS" >> local.properties
            echo "keyPassword=$KEY_PASSWORD" >> local.properties
            ./gradlew :app:assembleRelease --stacktrace
            SOURCE_APK=$(ls app/build/outputs/apk/release/*.apk | head -1)
            APK_NAME="Kaze-SLauncher-${TAG}-release.apk"
            echo "Uploading signed release APK"
          else
            SOURCE_APK=$(ls app/build/outputs/apk/debug/*.apk | head -1)
            APK_NAME="Kaze-SLauncher-${TAG}-debug.apk"
            echo "Uploading debug APK (no signing config)"
          fi
          cp "$SOURCE_APK" "$APK_NAME"
          gh release create "${TAG}" "$APK_NAME" --title "${TAG}" --notes "See commits for changes." --clobber 2>/dev/null || \
          gh release upload "${TAG}" "$APK_NAME" --clobber
          echo "✅ APK uploaded to Release ${TAG}"
