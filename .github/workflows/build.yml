name: Build APK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> "$GITHUB_ENV"
          echo "/usr/local/lib/android/sdk/platform-tools" >> "$GITHUB_PATH"
          echo "/usr/local/lib/android/sdk/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-35" > /dev/null 2>&1 || true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Download bundled assets (proot + Ubuntu rootfs)
        run: ./gradlew :app:downloadBundledAssets --stacktrace

      - name: Run lint
        run: ./gradlew :app:lintDebug --stacktrace
        continue-on-error: true

      - name: Build Debug APK
        id: debug-build
        run: |
          set -uxo pipefail
          ./gradlew :app:assembleDebug --stacktrace 2>&1 | tee /tmp/build-debug.log
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Upload Debug build log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-debug-log
          path: /tmp/build-debug.log
          if-no-files-found: ignore

      - name: Upload Debug APK as artifact
        if: steps.debug-build.outputs.exit_code == '0'
        uses: actions/upload-artifact@v7
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: ignore

      - name: Build and Upload Release APK (tag only)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          set -euxo pipefail
          TAG="${GITHUB_REF_NAME}"
          
          PREV_TAG=$(git tag -l "v*" --sort=-v:refname | grep -A1 "^${TAG}$" | tail -1)
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git tag -l "v*" --sort=-v:refname | head -1)
            [ "$PREV_TAG" = "$TAG" ] && PREV_TAG=""
          fi
          
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log "${PREV_TAG}..${TAG}" --oneline --no-merges)
          else
            COMMITS=$(git log "${TAG}" --oneline --no-merges -20)
          fi
          
          if [ -n "$COMMITS" ]; then
            RELEASE_NOTES=$(cat <<EOF
## 更新内容

$(echo "$COMMITS" | sed 's/^/\- /')

---

*版本: ${TAG}*
EOF
)
          else
            RELEASE_NOTES="## 更新内容

暂无详细更新记录。

---

*版本: ${TAG}*"
          fi
          
          {
            echo "TAG=${TAG}"
            echo "PREV_TAG=${PREV_TAG:-none}"
            echo "HAS_KEYSTORE=$([ -n "$KEYSTORE_BASE64" ] && echo yes || echo no)"
            RELEASE_BUILD_OK=false
            if [ -n "$KEYSTORE_BASE64" ]; then
              echo "$KEYSTORE_BASE64" | base64 -d > release-keystore.jks
              echo "storeFile=release-keystore.jks" >> local.properties
              echo "storePassword=$KEYSTORE_PASSWORD" >> local.properties
              echo "keyAlias=$KEY_ALIAS" >> local.properties
              echo "keyPassword=$KEY_PASSWORD" >> local.properties
              if ./gradlew :app:assembleRelease --stacktrace; then
                RELEASE_BUILD_OK=true
                echo "Release build succeeded"
              else
                echo "assembleRelease failed, falling back to debug APK"
              fi
            fi
            if [ "$RELEASE_BUILD_OK" = "true" ]; then
              SOURCE_APK=$(find app/build/outputs/apk/release -maxdepth 1 -name '*.apk' -print -quit)
              APK_NAME="Kaze-SLauncher-${TAG}-release.apk"
            else
              SOURCE_APK=$(find app/build/outputs/apk/debug -maxdepth 1 -name '*.apk' -print -quit)
              APK_NAME="Kaze-SLauncher-${TAG}-debug.apk"
            fi
            if [ -z "$SOURCE_APK" ] || [ ! -f "$SOURCE_APK" ]; then
              echo "ERROR: no APK found at expected path"
              echo "release/ dir:"
              ls -la app/build/outputs/apk/release/ 2>&1 || true
              echo "debug/ dir:"
              ls -la app/build/outputs/apk/debug/ 2>&1 || true
              exit 1
            fi
            echo "SOURCE_APK=${SOURCE_APK}"
            echo "APK_NAME=${APK_NAME}"
            cp "$SOURCE_APK" "$APK_NAME"
            echo "RELEASE_NOTES=$(printf '%s' "$RELEASE_NOTES" | head -20)"
            if gh release view "${TAG}" > /dev/null 2>&1; then
              echo "Release ${TAG} exists, updating notes..."
              echo "$RELEASE_NOTES" | gh release edit "${TAG}" --notes-file -
              echo "Uploading asset..."
              gh release upload "${TAG}" "$APK_NAME" --clobber
            else
              echo "Creating new release ${TAG}..."
              echo "$RELEASE_NOTES" | gh release create "${TAG}" "$APK_NAME" --title "${TAG}" --notes-file - --prerelease
            fi
            echo "APK uploaded to Release ${TAG}"
          } 2>&1 | tee /tmp/build-release.log

      - name: Upload Release build log
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v7
        with:
          name: build-release-log
          path: /tmp/build-release.log
          if-no-files-found: ignore