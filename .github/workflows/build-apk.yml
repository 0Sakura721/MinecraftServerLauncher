name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  actions: read
  checks: write
  contents: write

jobs:
  build-debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-36 build-tools;36.0.0"

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MinecraftServerLauncher-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  build-release:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-36 build-tools;36.0.0"

      - name: Create keystore
        run: |
          keytool -genkey -v \
            -keystore debug.keystore \
            -alias debug \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Debug, OU=Dev, O=MCServer, L=Unknown, ST=Unknown, C=US"

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MinecraftServerLauncher-release
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      - name: Get version
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed "s/.*\"\(.*\)\"/\1/")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "MCServer Launcher v${{ steps.version.outputs.version }}"
          body: |
            ## MCServer Launcher v${{ steps.version.outputs.version }}

            在 Android 设备上运行 Minecraft Java 版服务器的原生启动器。

            ### 新增
            - 请查看提交历史了解详情

            ### 安装说明
            1. 下载 APK 文件
            2. 在 Android 设备上安装
            3. 从 F-Droid 安装 Termux
            4. 在 Termux 中运行 `pkg install openjdk-21`
            5. 打开应用，配置并启动你的 Minecraft 服务器

            ### 注意
            需要 Termux 提供 Linux 运行环境，详见 README。
          files: app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
