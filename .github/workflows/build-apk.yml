name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  checks: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-36 build-tools;36.0.0"

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MinecraftServerLauncher-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk MinecraftServerLauncher-debug.apk

      - name: Upload APK to Release (on push to main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly Build
          files: MinecraftServerLauncher-debug.apk
          prerelease: true
          body: |
            ## Nightly Build

            - **Commit**: ${{ github.sha }}
            - **Date**: ${{ github.event.head_commit.timestamp }}

            > 自动构建，可能包含实验性功能。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
